name: iOS CI signing prepare
description: >
  Java/Gradle setup, App Store Connect API key, ephemeral keychain, Apple Development certificate
  validation, and Xcode toolchain selection. Expects the same job-level env as publish.yml
  (API_KEY_ID, API_KEY_DIR, API_KEY_BASE64_P8, API_ISSUER_ID, DEV_CERT_BASE64_P12,
  DEV_CERT_PASSKEY, KEYCHAIN_PASSWORD).

runs:
  using: composite
  steps:
    - name: Install API Key
      shell: bash
      run: |
        mkdir "$API_KEY_DIR"
        echo -n "$API_KEY_BASE64_P8" | base64 -d > "$API_KEY_DIR/AuthKey_$API_KEY_ID.p8"

    - name: Install Keychain
      shell: bash
      run: |
        KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
        echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
        security delete-keychain $KEYCHAIN_PATH || echo "Keychain not deleted because it does not already exist"
        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security list-keychains -d user -s "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

    - name: Install Development Certificate
      shell: bash
      run: |
        KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
        DEV_CERT=private_keys/dev_cert.p12
        INTERMEDIATE_CERT=private_keys/intermediate.cer
        echo -n "$DEV_CERT_BASE64_P12" | base64 -d > "$DEV_CERT"
        security import "$DEV_CERT" -P "$DEV_CERT_PASSKEY" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        echo -n "${{ inputs.apple-intermediate-certificate-base64-cer }}" | base64 -d > $INTERMEDIATE_CERT
        security import $INTERMEDIATE_CERT -A -k $KEYCHAIN_PATH || echo "Intermediate certificate already installed"

    - name: Validate Development Certificate
      shell: bash
      run: |
        DEV_CERT=$API_KEY_DIR/dev_cert.p12
        openssl pkcs12 -in "$DEV_CERT" -out client_cert.pem -nokeys -passin "pass:$DEV_CERT_PASSKEY"
        openssl x509 -in client_cert.pem -noout -text
        CERT_DATE=$(openssl x509 -in client_cert.pem -noout -enddate | cut -d= -f 2)
        rm client_cert.pem
        echo "Certificate expiration date: $CERT_DATE"
        test $(date -j -f '%b %d %H:%M:%S %Y %Z' "$CERT_DATE" '+%s') -gt $(date '+%s')

    - name: Set Keychain Partition List
      shell: bash
      run: |
        KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security find-certificate -Z "$KEYCHAIN_PATH"

    - name: Validate Keychain Codesigning Identity
      shell: bash
      run: |
        security list-keychains -d user
        security find-identity -v -p codesigning
        test $(security find-identity -v -p codesigning | grep 'valid identities found' | awk '{print $1}') -eq 1

    - name: Select Xcode
      shell: bash
      run: xcodes select

    - name: Xcode version
      shell: bash
      run: xcodebuild -version
