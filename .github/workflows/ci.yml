name: CI
on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: [macOS-26]
    steps:
      - uses: actions/checkout@v7
      - run: brew install swiftlint
      - run: swiftlint --version
      - run: swiftlint lint --strict --reporter github-actions-logging
  build:
    name: Build
    runs-on: [macOS-26]
    steps:
      - uses: actions/checkout@v7
      - run: xcrun simctl list runtimes
      - run: xcrun simctl list devices available iOS
      - run: xcodes select
      - run: xcodebuild -version
      - run: make build
  test:
    name: Test
    runs-on: [macOS-26]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - run: xcodes select
      - run: xcodebuild -version
      - run: make test
  js:
    name: Javascript Build Sanity Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: make js-clean js
